<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>naruto</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: black; }

    #v_src, #out {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1);
    }

    #out { z-index: 2; pointer-events: none; }

    .darkness {
      position: absolute;
      width: 100vw; height: 100vh;
      background: rgba(10, 5, 0, 0.3);
      z-index: 5;
    }

    .fx {
      position: absolute;
      transform: translate(-50%, -50%);
      display: none;
      mix-blend-mode: screen;
      z-index: 20;
    }

    #n { width: 1600px; }
    #s { width: 2400px; }

    #instaBtn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      padding: 10px 16px;
      background: linear-gradient(45deg, #ff0057, #ff7a00);
      color: white;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<video id="v_src" autoplay playsinline></video>
<canvas id="out"></canvas>
<div class="darkness"></div>

<a href="https://www.instagram.com/_whois._.adii" target="_blank" id="instaBtn">
📸 Follow Adii
</a>

<!-- 🎬 VISUALS -->
<video id="n" class="fx" src="assets/naruto.mp4" muted autoplay loop></video>
<video id="s" class="fx" src="assets/sasuke.mp4" muted autoplay loop></video>

<!-- 🔊 SOUND -->
<audio id="chargeSound" src="assets/charge.mp3"></audio>
<audio id="chakraSound" src="assets/chakra.mp3"></audio>

<script>
const v = document.getElementById('v_src');
const c = document.getElementById('out');
const ctx = c.getContext('2d');

const n = document.getElementById('n');
const s = document.getElementById('s');

const chargeSound = document.getElementById('chargeSound');
const chakraSound = document.getElementById('chakraSound');

let pwr=[0,0];
let wasOpen=[false,false];
let audioEnabled=false;

// 🔥 enable audio
document.body.addEventListener("click",()=>audioEnabled=true);

function playSound(sound){
  if(!audioEnabled) return;
  sound.currentTime=0;
  sound.play();
}

function checkOpen(p){
  let c=0,w=p[0];
  [8,12,16,20].forEach((t,i)=>{
    if(Math.hypot(p[t].x-w.x,p[t].y-w.y)>
       Math.hypot(p[[6,10,14,18][i]].x-w.x,p[[6,10,14,18][i]].y-w.y)) c++;
  });
  return c>=3;
}

function onResults(res){
  c.width=v.videoWidth;
  c.height=v.videoHeight;
  ctx.clearRect(0,0,c.width,c.height);

  n.style.display='none';
  s.style.display='none';

  if(res.multiHandLandmarks && res.multiHandedness){
    res.multiHandLandmarks.forEach((p,i)=>{
      let isR=res.multiHandedness[i].label==="Right";
      let idx=isR?1:0;

      drawConnectors(ctx,p,HAND_CONNECTIONS,{color:'#00d4ff'});
      drawLandmarks(ctx,p,{color:'#fff'});

      let open=checkOpen(p);
      pwr[idx]+=open?0.05:-0.15;
      pwr[idx]=Math.max(0,Math.min(1,pwr[idx]));

      // 🔊 SOUND TRIGGER
      if(open && !wasOpen[idx]){
        if(isR){
          s.play();
          playSound(chakraSound);
        } else {
          n.play();
          playSound(chargeSound);
        }
      }

      wasOpen[idx]=open;

      let w=p[0],k=p[9];

      if(pwr[idx]>0.01){
        let tx=(w.x+k.x)/2;
        let ty=(w.y+k.y)/2;

        if(isR){
          s.style.left=`${(1-tx)*innerWidth}px`;
          s.style.top=`${ty*innerHeight}px`;
          s.style.display='block';
          s.style.opacity=pwr[idx];
        } else {
          n.style.left=`${(1-(k.x+(k.x-w.x)*0.8))*innerWidth}px`;
          n.style.top=`${(k.y+(k.y-w.y)*0.8)*innerHeight-120}px`;
          n.style.display='block';
          n.style.opacity=pwr[idx];
        }
      }
    });
  }
}

const hands=new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({maxNumHands:2});
hands.onResults(onResults);

new Camera(v,{
  onFrame:async()=>await hands.send({image:v})
}).start();
</script>

</body>
</html>
