<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>naruto</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#v_src, #out {
  position: absolute;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  transform: scaleX(-1);
}

#out { z-index: 2; }

.darkness {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(10, 5, 0, 0.3);
  z-index: 5;
}

.fx {
  position: absolute;
  transform: translate(-50%, -50%);
  display: none;
  mix-blend-mode: screen;
  z-index: 20;
}

#n { width: 1600px; }
#s { width: 2400px; }

/* 🔥 INSTAGRAM BUTTON */
#cornerBtn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 999;

  padding: 10px 16px;
  background: linear-gradient(45deg, #ff0057, #ff7a00);
  color: white;
  text-decoration: none;
  font-size: 14px;
  border-radius: 20px;

  font-weight: bold;
  box-shadow: 0 0 12px rgba(255, 0, 100, 0.6);
  transition: 0.3s;
}

#cornerBtn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 18px rgba(255, 0, 100, 1);
}
</style>
</head>

<body>

<video id="v_src" autoplay playsinline></video>
<canvas id="out"></canvas>
<div class="darkness"></div>

<!-- 🔗 YOUR INSTAGRAM BUTTON -->
<a href="https://www.instagram.com/_whois._.adii?igsh=MTN5cXpidG8zdHUwaA==" 
   target="_blank" id="cornerBtn">
  📸 Follow Adii
</a>

<video id="n" class="fx" src="assets/naruto.mp4" muted autoplay loop></video>
<video id="s" class="fx" src="assets/sasuke.mp4" muted autoplay loop></video>

<script>
const v = document.getElementById('v_src');
const c = document.getElementById('out');
const ctx = c.getContext('2d');
const n = document.getElementById('n');
const s = document.getElementById('s');

let pwr = [0, 0];
let was = [0, 0];

function checkOpen(p){
  let count = 0;
  const wrist = p[0];
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];

  for (let i = 0; i < tips.length; i++) {
    if (Math.hypot(p[tips[i]].x - wrist.x, p[tips[i]].y - wrist.y) >
        Math.hypot(p[pips[i]].x - wrist.x, p[pips[i]].y - wrist.y)) {
      count++;
    }
  }
  return count >= 3;
}

function onResults(res){
  c.width = v.videoWidth;
  c.height = v.videoHeight;
  ctx.clearRect(0, 0, c.width, c.height);

  let fL = false;
  let fR = false;

  n.style.display = 'none';
  s.style.display = 'none';

  if (res.multiHandLandmarks && res.multiHandedness) {
    res.multiHandLandmarks.forEach((p, i) => {
      const isR = res.multiHandedness[i].label === "Right";
      const idx = isR ? 1 : 0;

      drawConnectors(ctx, p, HAND_CONNECTIONS, {color:'#00d4ff', lineWidth:3});
      drawLandmarks(ctx, p, {color:'#fff', radius:2});

      const open = checkOpen(p);
      pwr[idx] += open ? 0.05 : -0.15;
      pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

      if (open && !was[idx]) {
        (isR ? s : n).play();
      }
      was[idx] = open;

      const w = p[0];
      const k = p[9];

      if (pwr[idx] > 0.01) {
        if (isR) {
          fR = true;
          const tx = (w.x + k.x) / 2;
          const ty = (w.y + k.y) / 2;

          s.style.left = `${(1 - tx) * innerWidth}px`;
          s.style.top = `${ty * innerHeight}px`;
          s.style.display = 'block';
          s.style.opacity = pwr[idx];
        } else {
          fL = true;
          const dx = k.x - w.x;
          const dy = k.y - w.y;

          const tx = k.x + dx * 0.8;
          const ty = k.y + dy * 0.8;

          n.style.left = `${(1 - tx) * innerWidth}px`;
          n.style.top = `${ty * innerHeight - 120}px`;
          n.style.display = 'block';
          n.style.opacity = pwr[idx];
        }
      }
    });
  }

  if (!fL) {
    pwr[0] = Math.max(0, pwr[0] - 0.1);
    if (pwr[0] > 0) n.style.display = 'block';
    was[0] = false;
  }

  if (!fR) {
    pwr[1] = Math.max(0, pwr[1] - 0.1);
    if (pwr[1] > 0) s.style.display = 'block';
    was[1] = false;
  }
}

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.65
});

hands.onResults(onResults);

new Camera(v, {
  onFrame: async () => {
    await hands.send({ image: v });
  },
  width: 1280,
  height: 720
}).start();
</script>

</body>
</html>
