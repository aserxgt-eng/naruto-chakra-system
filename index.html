<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>naruto</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

#v_src,#out{
  position:absolute;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
}

#out{ z-index:2; }

.darkness{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(10,5,0,0.3);
  z-index:5;
}

.fx{
  position:absolute;
  transform:translate(-50%,-50%);
  display:none;
  mix-blend-mode:screen;
  z-index:20;
}

#charge{ width:1400px; }
#chakra{ width:2200px; }

/* Instagram Button */
#cornerBtn{
  position:absolute;
  bottom:20px;
  right:20px;
  z-index:999;
  padding:10px 16px;
  background:linear-gradient(45deg,#ff0057,#ff7a00);
  color:white;
  text-decoration:none;
  border-radius:20px;
}
</style>
</head>

<body>

<video id="v_src" autoplay playsinline></video>
<canvas id="out"></canvas>
<div class="darkness"></div>

<a href="https://www.instagram.com/_whois._.adii?igsh=MTN5cXpidG8zdHUwaA==" 
target="_blank" id="cornerBtn">📸 Follow Adii</a>

<!-- 🎬 VISUALS -->
<video id="charge" class="fx" src="assets/naruto.mp4" muted autoplay loop></video>
<video id="chakra" class="fx" src="assets/sasuke.mp4" muted autoplay loop></video>

<!-- 🔊 SOUND -->
<audio id="chargeSound" src="assets/charge.mp3"></audio>
<audio id="chakraSound" src="assets/chakra.mp3"></audio>

<script>
const v=document.getElementById('v_src');
const c=document.getElementById('out');
const ctx=c.getContext('2d');

const chargeV=document.getElementById('charge');
const chakraV=document.getElementById('chakra');

const chargeS=document.getElementById('chargeSound');
const chakraS=document.getElementById('chakraSound');

let pwr=0;
let wasOpen=false;
let audioEnabled=false;

document.body.addEventListener("click",()=>audioEnabled=true);

function play(s){
  if(!audioEnabled) return;
  s.currentTime=0;
  s.play();
}

function checkOpen(p){
  let c=0,w=p[0];
  [8,12,16,20].forEach((t,i)=>{
    if(Math.hypot(p[t].x-w.x,p[t].y-w.y)>
       Math.hypot(p[[6,10,14,18][i]].x-w.x,p[[6,10,14,18][i]].y-w.y)) c++;
  });
  return c>=3;
}

function onResults(res){
  c.width=v.videoWidth;
  c.height=v.videoHeight;
  ctx.clearRect(0,0,c.width,c.height);

  chargeV.style.display='none';
  chakraV.style.display='none';

  if(res.multiHandLandmarks){
    const p=res.multiHandLandmarks[0];

    const open=checkOpen(p);

    // power build
    pwr += open ? 0.04 : -0.08;
    pwr = Math.max(0, Math.min(1, pwr));

    const w=p[0];
    const k=p[9];

    const tx=(w.x+k.x)/2;
    const ty=(w.y+k.y)/2;

    const x=(1-tx)*innerWidth;
    const y=ty*innerHeight;

    // ⚡ CHARGING
    if(pwr>0.05 && pwr<0.6){
      chargeV.style.left=x+"px";
      chargeV.style.top=y+"px";
      chargeV.style.display='block';
      chargeV.style.opacity=pwr;

      if(open && !wasOpen){
        play(chargeS);
      }
    }

    // 🌀 FINAL CHAKRA
    if(pwr>=0.6){
      chakraV.style.left=x+"px";
      chakraV.style.top=y+"px";
      chakraV.style.display='block';
      chakraV.style.opacity=pwr;

      if(open && !wasOpen){
        play(chakraS);
      }
    }

    wasOpen=open;
  }
}

const hands=new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1,
  minDetectionConfidence:0.65,
  minTrackingConfidence:0.65
});

hands.onResults(onResults);

new Camera(v,{
  onFrame:async()=>await hands.send({image:v}),
  width:1280,
  height:720
}).start();
</script>

</body>
</html>
