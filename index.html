<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>naruto</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  filter: contrast(1.2) saturate(1.3);
}

#v_src, #out {
  position: absolute;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  transform: scaleX(-1);
}

#out { z-index: 2; }

.darkness {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 60%, black 100%);
  z-index: 5;
}

.fx {
  position: absolute;
  transform: translate(-50%, -50%);
  display: none;
  mix-blend-mode: screen;
  z-index: 20;

  /* 🔥 BRIGHT EFFECT */
  filter: brightness(1.6) contrast(1.4) saturate(1.5);
}

#n { width: 1600px; }
#s { width: 2400px; }
</style>
</head>

<body>

<video id="v_src" autoplay playsinline></video>
<canvas id="out"></canvas>
<div class="darkness"></div>

<video id="n" class="fx" src="assets/naruto.mp4" muted autoplay loop></video>
<video id="s" class="fx" src="assets/sasuke.mp4" muted autoplay loop></video>

<script>
const v = document.getElementById('v_src');
const c = document.getElementById('out');
const ctx = c.getContext('2d');
const n = document.getElementById('n');
const s = document.getElementById('s');

let pwr=[0,0], was=[0,0];
let particles=[];

// 🔥 PARTICLE CREATE
function createParticles(x,y){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,
      size:Math.random()*4+2,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:30
    });
  }
}

// 🌌 DRAW PARTICLES
function drawParticles(){
  particles.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,255,"+(p.life/30)+")";
    ctx.fill();

    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;

    if(p.life<=0) particles.splice(i,1);
  });
}

function checkOpen(p){
  let c=0,w=p[0];
  [8,12,16,20].forEach((t,i)=>{
    if(Math.hypot(p[t].x-w.x,p[t].y-w.y)>
       Math.hypot(p[[6,10,14,18][i]].x-w.x,p[[6,10,14,18][i]].y-w.y)) c++;
  });
  return c>=3;
}

function onResults(res){
  c.width=v.videoWidth;
  c.height=v.videoHeight;
  ctx.clearRect(0,0,c.width,c.height);

  let fL=false,fR=false;
  n.style.display=s.style.display='none';

  if(res.multiHandLandmarks){
    res.multiHandLandmarks.forEach((p,i)=>{
      let isR=res.multiHandedness[i].label==="Right";
      let idx=isR?1:0;

      // ✨ GLOW HAND
      ctx.save();
      ctx.shadowColor="#00eaff";
      ctx.shadowBlur=25;

      drawConnectors(ctx,p,HAND_CONNECTIONS,{color:'#00d4ff',lineWidth:3});
      drawLandmarks(ctx,p,{color:'#fff',radius:2});
      ctx.restore();

      let open=checkOpen(p);
      pwr[idx]+=open?0.05:-0.15;
      pwr[idx]=Math.max(0,Math.min(1,pwr[idx]));

      if(open&&!was[idx]){
        (isR?s:n).play();
      }
      was[idx]=open;

      let w=p[0],k=p[9];

      if(pwr[idx]>0.01){
        let tx=(w.x+k.x)/2;
        let ty=(w.y+k.y)/2;

        // 🌌 PARTICLES
        createParticles(tx*c.width, ty*c.height);

        if(isR){
          fR=true;
          s.style.left=`${(1-tx)*innerWidth}px`;
          s.style.top=`${ty*innerHeight}px`;
          s.style.display='block';
          s.style.opacity=Math.min(1,pwr[idx]+0.3);
        } else {
          fL=true;
          n.style.left=`${(1-(k.x+(k.x-w.x)*0.8))*innerWidth}px`;
          n.style.top=`${(k.y+(k.y-w.y)*0.8)*innerHeight-120}px`;
          n.style.display='block';
          n.style.opacity=Math.min(1,pwr[idx]+0.3);
        }
      }
    });
  }

  if(!fL){pwr[0]-=0.1;if(pwr[0]>0)n.style.display='block';}
  if(!fR){pwr[1]-=0.1;if(pwr[1]>0)s.style.display='block';}

  // 🌌 DRAW PARTICLES
  drawParticles();
}

const hands=new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:2,
  modelComplexity:1,
  minDetectionConfidence:0.65,
  minTrackingConfidence:0.65
});

hands.onResults(onResults);

new Camera(v,{
  onFrame:async()=>{
    await hands.send({image:v});
  },
  width:1280,
  height:720
}).start();
</script>

</body>
</html>
