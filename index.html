<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>naruto</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: black; }
    #v_src, #out {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1);
    }
    #out { z-index: 2; pointer-events: none; }
    .darkness {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(10, 5, 0, 0.3);
      mix-blend-mode: multiply; z-index: 5;
    }
    .fx {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none; display: none;
      mix-blend-mode: screen; z-index: 20;
    }
    #n { width: 1600px; }
    #s { width: 2400px; }
  </style>
</head>
<body>

<video id="v_src" autoplay playsinline></video>
<canvas id="out"></canvas>
<div class="darkness"></div>

<video id="n" class="fx" src="assets/naruto.mp4" muted autoplay loop></video>
<video id="s" class="fx" src="assets/sasuke.mp4" muted autoplay loop></video>

<script>
const v = document.getElementById('v_src');
const c = document.getElementById('out');
const ctx = c.getContext('2d');
const n = document.getElementById('n');
const s = document.getElementById('s');

const img = new Image();
img.src = "assets/sharingan.png";

let pwr=[0,0], was=[0,0];
let eyePulse=0;

// smoothing
let smoothL={x:0,y:0}, smoothR={x:0,y:0};

function checkOpen(p){
  let c=0,w=p[0];
  [8,12,16,20].forEach((t,i)=>{
    if(Math.hypot(p[t].x-w.x,p[t].y-w.y) >
       Math.hypot(p[[6,10,14,18][i]].x-w.x,p[[6,10,14,18][i]].y-w.y)) c++;
  });
  return c>=3;
}

function onResults(res){
  c.width=v.videoWidth;
  c.height=v.videoHeight;
  ctx.clearRect(0,0,c.width,c.height);

  let fL=false,fR=false;
  n.style.display=s.style.display='none';

  if(res.multiHandLandmarks){
    res.multiHandLandmarks.forEach((p,i)=>{
      let isR=res.multiHandedness[i].label==="Right";
      let idx=isR?1:0;

      ctx.save();
      ctx.shadowBlur=10;
      ctx.shadowColor='#00fbff';
      drawConnectors(ctx,p,HAND_CONNECTIONS,{color:'#00d4ff',lineWidth:3});
      drawLandmarks(ctx,p,{color:'#fff',radius:2});
      ctx.restore();

      let open=checkOpen(p);
      pwr[idx]+=open?0.05:-0.15;
      pwr[idx]=Math.max(0,Math.min(1,pwr[idx]));

      if(open&&!was[idx]){
        (isR?s:n).play();
      }
      was[idx]=open;

      let w=p[0],k=p[9];

      if(pwr[idx]>0.01){
        let tx=(w.x+k.x)/2, ty=(w.y+k.y)/2;
        if(isR){
          fR=true;
          s.style.left=`${(1-tx)*innerWidth}px`;
          s.style.top=`${ty*innerHeight}px`;
          s.style.display='block';
          s.style.opacity=pwr[idx];
        } else {
          fL=true;
          n.style.left=`${(1-(k.x+(k.x-w.x)*0.8))*innerWidth}px`;
          n.style.top=`${(k.y+(k.y-w.y)*0.8)*innerHeight-120}px`;
          n.style.display='block';
          n.style.opacity=pwr[idx];
        }
      }
    });
  }

  if(!fL){pwr[0]-=0.1; if(pwr[0]>0)n.style.display='block';}
  if(!fR){pwr[1]-=0.1; if(pwr[1]>0)s.style.display='block';}
}

// 👁️ PERFECT EYE TRACKING
function onFaceResults(r){
  if(!r.multiFaceLandmarks)return;

  const lm=r.multiFaceLandmarks[0];

  const l=lm[468], rE=lm[473];
  const lTop=lm[159], lBot=lm[145];
  const rTop=lm[386], rBot=lm[374];

  let lx=(1-l.x)*c.width, ly=l.y*c.height;
  let rx=(1-rE.x)*c.width, ry=rE.y*c.height;

  // 🔧 vertical correction
  let yOff=Math.abs(lTop.y-lBot.y)*c.height*1.5;
  ly-=yOff; ry-=yOff;

  // 🔧 inward correction
  lx+=5; rx-=5;

  // ✨ smoothing
  smoothL.x = smoothL.x*0.7 + lx*0.3;
  smoothL.y = smoothL.y*0.7 + ly*0.3;
  smoothR.x = smoothR.x*0.7 + rx*0.3;
  smoothR.y = smoothR.y*0.7 + ry*0.3;

  // 👁️ blink detection
  let openL=Math.abs(lTop.y-lBot.y);
  let openR=Math.abs(rTop.y-rBot.y);

  let dist=Math.hypot(lx-rx,ly-ry);
  let size=dist*0.12;

  eyePulse+=0.05;
  let pulse=1+Math.sin(eyePulse)*0.05;

  ctx.save();
  ctx.shadowColor="red";
  ctx.shadowBlur=20;
  ctx.globalAlpha=0.95;

  if(openL>0.01)
    ctx.drawImage(img,smoothL.x-size,smoothL.y-size,size*2*pulse,size*2*pulse);

  if(openR>0.01)
    ctx.drawImage(img,smoothR.x-size,smoothR.y-size,size*2*pulse,size*2*pulse);

  ctx.restore();
}

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:2,minDetectionConfidence:0.65});
hands.onResults(onResults);

const face=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
face.setOptions({refineLandmarks:true});
face.onResults(onFaceResults);

new Camera(v,{
  onFrame:async()=>{
    await hands.send({image:v});
    await face.send({image:v});
  }
}).start();
</script>
</body>
</html>
